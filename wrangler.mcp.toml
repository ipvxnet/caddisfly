# caddisfly-mcp — standalone MCP server exposing the inventory REST API (Phase 3)
# as MCP tools. NO DB/secrets: it only proxies tool calls to
# ${INVENTORY_API_BASE}/api/inventory/products, forwarding the caller's
# `Authorization: Bearer inv_…` token. Separate from the app worker for a clean,
# minimal surface (mirrors wrangler.sites.toml: top-level = production,
# [env.preview] = preview).
#
#   Preview:    npx wrangler deploy -c wrangler.mcp.toml --env preview
#   Production: npx wrangler deploy -c wrangler.mcp.toml
#
# URLs:
#   prod    → https://mcp.caddisfly.ai            (zone route, workers.dev OFF)
#   preview → https://caddisfly-mcp-preview.fabianodevtools.workers.dev  (still .dev)

# Production serves on mcp.caddisfly.ai (a zone route); the workers.dev URL is
# DISABLED. Requires a PROXIED DNS record for mcp.caddisfly.ai in the caddisfly.ai
# zone (e.g. CNAME mcp → caddisfly.ai, orange-cloud ON) — added by the operator.
name = "caddisfly-mcp"
main = "src/mcp-worker.js"
compatibility_date = "2024-11-01"
workers_dev = false
routes = [
  { pattern = "mcp.caddisfly.ai", zone_name = "caddisfly.ai" },
]
vars = { INVENTORY_API_BASE = "https://caddisfly.ai", MCP_SERVER_NAME = "caddisfly-inventory" }

# Direct worker-to-worker call to the app worker (avoids the *.workers.dev
# subrequest quirk). The MCP worker hits the inventory route via env.APP.fetch;
# INVENTORY_API_BASE stays as a fallback.
[[services]]
binding = "APP"
service = "caddisfly"

[env.preview]
name = "caddisfly-mcp-preview"
workers_dev = true
# Must be EXPLICIT — wrangler otherwise inherits the top-level mcp.caddisfly.ai
# route into this env, so the preview worker would steal the prod route.
routes = []
vars = { INVENTORY_API_BASE = "https://caddisfly-preview.fabianodevtools.workers.dev", MCP_SERVER_NAME = "caddisfly-inventory-preview" }

[[env.preview.services]]
binding = "APP"
service = "caddisfly-preview"
