name = "caddisfly"
main = "src/index.js"
compatibility_date = "2024-01-01"
compatibility_flags = ["nodejs_compat"]

# D1 Database binding — default/top-level targets the `caddisfly` worker (== production),
# so it points at the PRODUCTION database. Preview overrides this in [env.preview] below.
[[d1_databases]]
binding = "DB"
database_name = "caddisfly-db-prod"
database_id = "eae91748-f3a9-4f78-9662-067ca2197181"

# R2 Storage binding (production)
[[r2_buckets]]
binding = "STORAGE"
bucket_name = "caddisfly-storage-prod"

# Workers AI binding
[ai]
binding = "AI"

# Browser Rendering binding
[browser]
binding = "BROWSER"

# Email transport: Resend HTTP API (preferred). Set the secret per environment:
#   npx wrangler secret put RESEND_API_KEY --env preview
#   npx wrangler secret put RESEND_API_KEY --env production
# The send-from domain (EMAIL_FROM, default noreply@caddisfly.ai) must be a
# verified domain in Resend (add their SPF/DKIM DNS records). Without the secret,
# dev/preview logs the verify link to the console (stub mode).
#
# Optional fallback: Cloudflare Email Workers binding (verified destinations only).
# [[send_email]]
# name = "SEND_EMAIL"

# Environment variables
[vars]
ENVIRONMENT = "development"
APP_URL = "http://localhost:8787"
GOOGLE_REDIRECT_URI = "http://localhost:8787/auth/google/callback"
SESSION_DURATION_HOURS = "168"
PREVIEW_PAGE_LIMIT = "2"
EMAIL_FROM = "noreply@caddisfly.ai"
MAX_HTML_SIZE_MB = "5"
SCRAPE_TIMEOUT_SECONDS = "30"

# Preview environment (dev branch)
[env.preview]
name = "caddisfly-preview"
vars = { ENVIRONMENT = "preview", APP_URL = "https://caddisfly-preview.fabianodevtools.workers.dev", GOOGLE_REDIRECT_URI = "https://caddisfly-preview.fabianodevtools.workers.dev/auth/google/callback", SESSION_DURATION_HOURS = "168", PREVIEW_PAGE_LIMIT = "2", EMAIL_FROM = "noreply@caddisfly.ai", MAX_HTML_SIZE_MB = "5", SCRAPE_TIMEOUT_SECONDS = "30", SITES_BASE = "caddisfly.app", SITES_PREVIEW_SUFFIX = "-preview", SAAS_WORKER_SCRIPT = "caddisfly-sites-preview" }

[[env.preview.d1_databases]]
binding = "DB"
database_name = "caddisfly-db"
database_id = "8406777e-c7d1-4bf9-9a14-e554f8a5021a"

[[env.preview.r2_buckets]]
binding = "STORAGE"
bucket_name = "caddisfly-storage"

[env.preview.ai]
binding = "AI"

[env.preview.browser]
binding = "BROWSER"

# [[env.preview.send_email]]
# name = "SEND_EMAIL"

# Production environment (main branch)
[env.production]
name = "caddisfly"
vars = { ENVIRONMENT = "production", APP_URL = "https://caddisfly.ai", GOOGLE_REDIRECT_URI = "https://caddisfly.ai/auth/google/callback", SESSION_DURATION_HOURS = "168", PREVIEW_PAGE_LIMIT = "2", EMAIL_FROM = "noreply@caddisfly.ai", MAX_HTML_SIZE_MB = "5", SCRAPE_TIMEOUT_SECONDS = "30", SITES_BASE = "caddisfly.app", SAAS_WORKER_SCRIPT = "caddisfly-sites" }

[[env.production.d1_databases]]
binding = "DB"
database_name = "caddisfly-db-prod"
database_id = "eae91748-f3a9-4f78-9662-067ca2197181"

[[env.production.r2_buckets]]
binding = "STORAGE"
bucket_name = "caddisfly-storage-prod"

[env.production.ai]
binding = "AI"

[env.production.browser]
binding = "BROWSER"

# Daily domain auto-renewal + expiry reminders (08:00 UTC). Production only —
# preview shares the real Namecheap account, and the scheduled() handler also
# guards on ENVIRONMENT === 'production'.
[env.production.triggers]
crons = ["0 8 * * *"]

# [[env.production.send_email]]
# name = "SEND_EMAIL"

# Secrets (set via CLI):
# Preview: npx wrangler secret put GOOGLE_CLIENT_ID --env preview
# Preview: npx wrangler secret put GOOGLE_CLIENT_SECRET --env preview
# Preview: npx wrangler secret put GOOGLE_PLACES_API_KEY --env preview
# Production: npx wrangler secret put GOOGLE_CLIENT_ID --env production
# Production: npx wrangler secret put GOOGLE_CLIENT_SECRET --env production
# Production: npx wrangler secret put GOOGLE_PLACES_API_KEY --env production
#
# Stripe billing (all set as secrets so test vs live IDs aren't committed; the
# code reads them from env regardless of var-vs-secret). Set per environment —
# use sk_test_…/test price IDs on preview, sk_live_…/live price IDs on prod:
#   STRIPE_SECRET_KEY            (sk_test_… / sk_live_…)
#   STRIPE_WEBHOOK_SECRET        (whsec_…, from the webhook endpoint you create
#                                 pointing at <APP_URL>/api/stripe/webhook)
#   STRIPE_PRICE_STARTER_MONTHLY  STRIPE_PRICE_STARTER_ANNUAL
#   STRIPE_PRICE_PRO_MONTHLY      STRIPE_PRICE_PRO_ANNUAL
#   STRIPE_PRICE_AGENCY_MONTHLY   STRIPE_PRICE_AGENCY_ANNUAL
# e.g. npx wrangler secret put STRIPE_SECRET_KEY --env preview
#
# Stripe Connect (commerce v1 — merchants connect their own Stripe). From
# Stripe Dashboard → Settings → Connect → Onboarding options → OAuth: enable
# OAuth for Standard accounts, copy the client id, and allow-list the redirect
# URI <APP_ORIGIN>/store/stripe/callback for BOTH environments (preview uses
# the ca_… test-mode client id, prod the live one). Until set, the store UI
# shows "payments not available" (email-stub degradation pattern).
#   STRIPE_CONNECT_CLIENT_ID     (ca_…)
#   STRIPE_CONNECT_WEBHOOK_SECRET (whsec_…, from a webhook endpoint created
#                                 with "Listen to events on Connected accounts"
#                                 pointing at <APP_ORIGIN>/api/store/webhook,
#                                 event: checkout.session.completed. Optional —
#                                 the receipt page also records orders; the
#                                 webhook is the reliability backstop.)
# e.g. npx wrangler secret put STRIPE_CONNECT_CLIENT_ID --env preview
#
# Slack operator alerts (optional). A Slack Incoming Webhook URL; when set, the
# worker posts ops alerts (new/replied support tickets, new subscriptions,
# cancellations, credit packs) to that channel. Silently skipped when unset
# (email-stub degradation pattern). Non-production posts are prefixed [preview].
#   SLACK_WEBHOOK_URL  (https://hooks.slack.com/services/…)
# e.g. npx wrangler secret put SLACK_WEBHOOK_URL --env production
#
# Namecheap domain reselling (optional — domain store UI hides until set).
# All API calls route through the fixed-IP relay on the VPS (Namecheap
# allowlists caller IPs; Workers have none) — see scripts/nc-relay/README.md.
#   NC_RELAY_URL          (https://nc-relay.<your-domain>/nc)
#   NC_RELAY_SECRET       (shared secret, also in the relay's systemd unit)
#   NAMECHEAP_API_USER    (Namecheap account username)
#   NAMECHEAP_API_KEY     (Profile → Tools → API Access)
#   NAMECHEAP_CLIENT_IP   (the relay VPS public IP)
# Optional var NAMECHEAP_SANDBOX = "1" routes to api.sandbox.namecheap.com.
# e.g. npx wrangler secret put NC_RELAY_URL --env preview
#
# Custom domains (Cloudflare for SaaS — Custom Hostnames). Until set, the
# "Custom domain" UI shows but registration is disabled. Enable Cloudflare for
# SaaS on the caddisfly.app zone first.
#   CF_API_TOKEN      (token scoped to the caddisfly.app zone: SSL and
#                      Certificates = Edit; lets us create custom hostnames)
#   CF_ZONE_ID        (the caddisfly.app zone id)
#   SAAS_WORKER_SCRIPT (the sites worker that serves custom hostnames — set per
#                      env: "caddisfly-sites" prod, "caddisfly-sites-preview"
#                      preview. A Worker route <hostname>/* → this script is
#                      created per custom hostname; without it an active cert
#                      still 522s. Requires the CF token to also have
#                      Zone:Workers Routes: Edit.)
#   SAAS_CNAME_TARGET (hostname customers CNAME to, e.g. sites.caddisfly.app —
#                      the SaaS fallback origin/target)
# e.g. npx wrangler secret put CF_API_TOKEN --env preview
