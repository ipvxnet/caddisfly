# caddisfly-sites — lean worker serving published customer sites on
# *.caddisfly.app. Separate from the main app worker (wrangler.toml): R2
# read-only, no DB/secrets/AI. Reads what the app's deploy step writes
# (sites/<subdomain>/<slug>.html, assets/<id>/<file>).
#
# Deploy (preview, for live testing — owns the *.caddisfly.app route today):
#   npx wrangler deploy -c wrangler.sites.toml --env preview
# Deploy (production — move the route here at cutover; reads the prod bucket):
#   npx wrangler deploy -c wrangler.sites.toml
#
# NOTE: a route can belong to only ONE worker. Today the PREVIEW worker owns
# *.caddisfly.app/*. At prod cutover, remove the route from [env.preview] (or
# redeploy preview without it) before deploying production, or the deploy will
# conflict.

name = "caddisfly-sites"
main = "src/sites-worker.js"
compatibility_date = "2024-01-01"

# Production wildcard route (all top-level keys MUST precede any [table] header).
routes = [
  { pattern = "*.caddisfly.app/*", zone_name = "caddisfly.app" },
]

# Production binds the production bucket.
[[r2_buckets]]
binding = "STORAGE"
bucket_name = "caddisfly-storage-prod"

# Preview: caddisfly-sites-preview, reads the PREVIEW bucket, and currently owns
# the *.caddisfly.app route for live testing.
[env.preview]
name = "caddisfly-sites-preview"
routes = [
  { pattern = "*.caddisfly.app/*", zone_name = "caddisfly.app" },
]

[[env.preview.r2_buckets]]
binding = "STORAGE"
bucket_name = "caddisfly-storage"
