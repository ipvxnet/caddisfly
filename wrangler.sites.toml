# caddisfly-sites — lean worker serving published customer sites on
# *.caddisfly.app. Separate from the main app worker (wrangler.toml): R2
# read-only, no DB/secrets/AI. Reads what the app's deploy step writes
# (sites/<subdomain>/<slug>.html, assets/<id>/<file>).
#
# Deploy (preview, tests via workers.dev URL — no zone route as of cutover):
#   npx wrangler deploy -c wrangler.sites.toml --env preview
# Deploy (production — owns *.caddisfly.app/*, reads the prod bucket):
#   npx wrangler deploy -c wrangler.sites.toml
#
# NOTE: a route can belong to only ONE worker. As of the 2026-06-04 cutover the
# PRODUCTION worker owns *.caddisfly.app/*; preview's route was removed first so
# production could claim it without conflict.

name = "caddisfly-sites"
main = "src/sites-worker.js"
compatibility_date = "2024-01-01"

# Production wildcard route (all top-level keys MUST precede any [table] header).
routes = [
  { pattern = "*.caddisfly.app/*", zone_name = "caddisfly.app" },
]

# Production binds the production bucket.
[[r2_buckets]]
binding = "STORAGE"
bucket_name = "caddisfly-storage-prod"

# Preview: caddisfly-sites-preview, reads the PREVIEW bucket. As of the 2026-06-04
# prod cutover the PRODUCTION worker owns *.caddisfly.app/* (top-level route above);
# preview no longer claims that route and tests via its workers.dev URL (?host=).
[env.preview]
name = "caddisfly-sites-preview"
workers_dev = true   # workers.dev URL for ?site=/?host= testing (no zone route)

[[env.preview.r2_buckets]]
binding = "STORAGE"
bucket_name = "caddisfly-storage"
